apiVersion: apps/v1
kind: Deployment
metadata:
  name: monefy-frontend
  labels:
    app: monefy-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monefy-frontend
  template:
    metadata:
      labels:
        app: monefy-frontend
    spec:
      containers:
        - name: frontend
          image: monefy-frontend:v1
          imagePullPolicy: Never   # Use local minikube image
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: monefy-frontend
spec:
  selector:
    app: monefy-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
